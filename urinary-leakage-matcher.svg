<svg xmlns="http://www.w3.org/2000/svg" width="720" height="450" viewBox="0 0 720 450" font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="450" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">Urinary leakage: match the PATTERN, not the vibe</text>
  <text x="360" y="47" text-anchor="middle" font-size="12.5" fill="#666">the timing / trigger picks the lesion — i default to VVF when it doesn't fit</text>

  <!-- ===== col 1: VVF ===== -->
  <rect x="20" y="62" width="220" height="300" rx="10" fill="#fbf4f4" stroke="#8B1A1A" stroke-width="2"/>
  <text x="130" y="86" text-anchor="middle" font-size="14.5" font-weight="700" fill="#8B1A1A">VESICOVAGINAL FISTULA</text>
  <!-- continuous drip: sun + moon = day AND night -->
  <circle cx="92" cy="118" r="13" fill="none" stroke="#e0a800" stroke-width="2.5"/>
  <g stroke="#e0a800" stroke-width="2" stroke-linecap="round"><line x1="92" y1="98" x2="92" y2="102"/><line x1="92" y1="134" x2="92" y2="138"/><line x1="72" y1="118" x2="76" y2="118"/><line x1="108" y1="118" x2="112" y2="118"/></g>
  <path d="M154,108 a13,13 0 1 0 13,22 a11,11 0 1 1 -13,-22 z" fill="#5b6b8c"/>
  <text x="130" y="156" text-anchor="middle" font-size="12.5" font-weight="700" fill="#333">CONTINUOUS day + night</text>
  <text x="130" y="178" text-anchor="middle" font-size="11.5" fill="#444">always wet, any position</text>
  <text x="130" y="198" text-anchor="middle" font-size="11.5" fill="#444">after obstructed labor /</text>
  <text x="130" y="214" text-anchor="middle" font-size="11.5" fill="#444">hysterectomy (sloughs 7–14d)</text>
  <text x="130" y="236" text-anchor="middle" font-size="11.5" fill="#444">anterior-wall granulation</text>
  <rect x="44" y="256" width="172" height="28" rx="6" fill="#eef2f7" stroke="#34495e" stroke-width="1.3"/>
  <text x="130" y="275" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2c3e50">confirm: methylene-blue dye</text>
  <text x="130" y="312" text-anchor="middle" font-size="11" fill="#8B1A1A" font-weight="700">CONSTANT is the whole rule</text>
  <text x="130" y="332" text-anchor="middle" font-size="10.5" fill="#888">if it's not constant — not VVF</text>

  <!-- ===== col 2: urethral diverticulum ===== -->
  <rect x="250" y="62" width="220" height="300" rx="10" fill="#f5f7fa" stroke="#2980b9" stroke-width="2"/>
  <text x="360" y="86" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1f6f8b">URETHRAL DIVERTICULUM</text>
  <!-- intermittent: dashed clock -->
  <circle cx="360" cy="120" r="16" fill="none" stroke="#2980b9" stroke-width="2.5" stroke-dasharray="4 4"/>
  <line x1="360" y1="120" x2="360" y2="110" stroke="#2980b9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="360" y1="120" x2="368" y2="124" stroke="#2980b9" stroke-width="2.5" stroke-linecap="round"/>
  <text x="360" y="156" text-anchor="middle" font-size="12.5" font-weight="700" fill="#333">INTERMITTENT</text>
  <text x="360" y="176" text-anchor="middle" font-size="11.5" fill="#444">the "3 Ds": Dysuria,</text>
  <text x="360" y="192" text-anchor="middle" font-size="11.5" fill="#444">Dyspareunia, post-void Dribbling</text>
  <text x="360" y="214" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1f6f8b">tender ANTERIOR-wall mass</text>
  <text x="360" y="230" text-anchor="middle" font-size="11.5" fill="#444">milk it → expresses discharge</text>
  <rect x="274" y="252" width="172" height="44" rx="6" fill="#eef6fb" stroke="#2980b9" stroke-width="1.3"/>
  <text x="360" y="270" text-anchor="middle" font-size="11.5" fill="#1f6f8b">recurrent "UTI" sx,</text>
  <text x="360" y="287" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1f6f8b">NEG cultures, abx fail</text>
  <text x="360" y="320" text-anchor="middle" font-size="11" fill="#1f6f8b" font-weight="700">structural, not infectious</text>
  <text x="360" y="340" text-anchor="middle" font-size="10.5" fill="#888">intermittent + tender mass</text>

  <!-- ===== col 3: SUI ===== -->
  <rect x="480" y="62" width="220" height="300" rx="10" fill="#f4faf5" stroke="#2e7d32" stroke-width="2"/>
  <text x="590" y="86" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1b5e20">STRESS INCONTINENCE</text>
  <!-- cough burst -->
  <text x="590" y="128" text-anchor="middle" font-size="20" font-weight="700" fill="#2e7d32">cough!</text>
  <g stroke="#2e7d32" stroke-width="2" stroke-linecap="round" fill="none"><path d="M548,138 l-10,8"/><path d="M632,138 l10,8"/></g>
  <text x="590" y="160" text-anchor="middle" font-size="12.5" font-weight="700" fill="#333">leak SYNCHRONOUS w/ Valsalva</text>
  <text x="590" y="180" text-anchor="middle" font-size="11.5" fill="#444">stops when the pressure stops</text>
  <text x="590" y="200" text-anchor="middle" font-size="11.5" fill="#444">NO urgency · normal PVR</text>
  <text x="590" y="222" text-anchor="middle" font-size="11.5" fill="#444">+ cough stress test / Bonney</text>
  <rect x="504" y="244" width="172" height="44" rx="6" fill="#e6f4ea" stroke="#2e7d32" stroke-width="1.3"/>
  <text x="590" y="262" text-anchor="middle" font-size="11.5" fill="#1b5e20">urethral hypermobility</text>
  <text x="590" y="279" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1b5e20">(downward UVJ displacement)</text>
  <text x="590" y="312" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="700">mechanical, not detrusor</text>
  <text x="590" y="332" text-anchor="middle" font-size="10.5" fill="#888">positional / w/ effort</text>

  <!-- tell banner -->
  <rect x="20" y="376" width="680" height="60" rx="8" fill="#111"/>
  <text x="360" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">THE TELL — let the timing pick the lesion</text>
  <text x="360" y="421" text-anchor="middle" font-size="11.5" fill="#ddd">CONTINUOUS day+night = VVF (only) &#160;|&#160; intermittent + tender anterior mass = diverticulum &#160;|&#160; positional/cough = SUI</text>
</svg>
