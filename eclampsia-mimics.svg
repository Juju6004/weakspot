<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" font-family="Helvetica, Arial, sans-serif">
  <rect width="680" height="470" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">Postpartum seizure / focal deficit &#8800; automatic eclampsia</text>
  <text x="340" y="47" text-anchor="middle" font-size="12.5" fill="#666">eclampsia REQUIRES HTN + proteinuria — if either is missing, generate alternatives</text>

  <!-- top stem box -->
  <rect x="200" y="62" width="280" height="40" rx="8" fill="#eef2f7" stroke="#456" stroke-width="1.5"/>
  <text x="340" y="79" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">pregnancy / postpartum +</text>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">SEIZURE or focal deficit</text>

  <!-- gate diamond -->
  <polygon points="340,112 452,150 340,188 228,150" fill="#fff7e0" stroke="#b8860b" stroke-width="2"/>
  <text x="340" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a5b00">HTN + proteinuria</text>
  <text x="340" y="163" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a5b00">BOTH present?</text>

  <!-- YES branch -->
  <line x1="452" y1="150" x2="540" y2="150" stroke="#2e7d32" stroke-width="2"/>
  <text x="470" y="142" font-size="12" font-weight="700" fill="#2e7d32">YES</text>
  <rect x="540" y="128" width="128" height="44" rx="8" fill="#e6f4ea" stroke="#2e7d32" stroke-width="2"/>
  <text x="604" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">ECLAMPSIA</text>
  <text x="604" y="163" text-anchor="middle" font-size="11.5" fill="#2e7d32">MgSO4 + deliver</text>

  <!-- NO branch down -->
  <line x1="340" y1="188" x2="340" y2="214" stroke="#c0392b" stroke-width="2"/>
  <text x="352" y="206" font-size="12" font-weight="700" fill="#c0392b">NO / either missing</text>
  <rect x="150" y="214" width="380" height="26" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="340" y="232" text-anchor="middle" font-size="12.5" font-weight="700" fill="#a93226">NOT eclampsia &#8594; generate alternatives by the clue</text>

  <!-- three mimic boxes -->
  <g font-size="11.5">
    <!-- stroke -->
    <rect x="24" y="258" width="208" height="92" rx="8" fill="#f5f7fa" stroke="#34495e" stroke-width="1.5"/>
    <text x="128" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#2c3e50">STROKE</text>
    <text x="128" y="298" text-anchor="middle" fill="#444">focal weakness</text>
    <text x="128" y="314" text-anchor="middle" fill="#444">+ severe HTN</text>
    <text x="128" y="336" text-anchor="middle" font-weight="700" fill="#2980b9">&#8594; CT head</text>

    <!-- amphetamine -->
    <rect x="236" y="258" width="208" height="92" rx="8" fill="#f5f7fa" stroke="#34495e" stroke-width="1.5"/>
    <text x="340" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#2c3e50">AMPHETAMINE</text>
    <text x="340" y="296" text-anchor="middle" fill="#444">dilated pupils + &#8595;Na</text>
    <text x="340" y="312" text-anchor="middle" fill="#444">NO proteinuria</text>
    <text x="340" y="336" text-anchor="middle" font-weight="700" fill="#8e44ad">&#8594; tox screen</text>

    <!-- CVST -->
    <rect x="448" y="258" width="208" height="92" rx="8" fill="#f5f7fa" stroke="#34495e" stroke-width="1.5"/>
    <text x="552" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#2c3e50">CVST</text>
    <text x="552" y="296" text-anchor="middle" fill="#444">papilledema + thrombophilia</text>
    <text x="552" y="312" text-anchor="middle" fill="#444">NO proteinuria</text>
    <text x="552" y="336" text-anchor="middle" font-weight="700" fill="#16a085">&#8594; MR venography</text>
  </g>

  <!-- tell banner -->
  <rect x="20" y="372" width="640" height="78" rx="8" fill="#111"/>
  <text x="340" y="396" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">THE TELL</text>
  <text x="340" y="418" text-anchor="middle" font-size="12.5" fill="#eee">no HTN &#8595;&#8595; OR no proteinuria &#8594; it is NOT eclampsia</text>
  <text x="340" y="438" text-anchor="middle" font-size="12.5" fill="#bbb">confirm BOTH before you commit — then match the extra clue to the mimic</text>
</svg>
