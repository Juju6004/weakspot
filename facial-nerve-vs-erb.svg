<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" font-family="Helvetica, Arial, sans-serif">
  <rect width="680" height="470" fill="#ffffff"/>
  <text x="340" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1a1a">Forceps birth injury: facial nerve (VII) vs Erb-Duchenne</text>
  <text x="340" y="47" text-anchor="middle" font-size="12.5" fill="#666">forehead + eye involved = the FACE nerve &#183; arm 'waiter's tip' = brachial plexus</text>

  <!-- LEFT: facial nerve palsy -->
  <rect x="24" y="64" width="304" height="286" rx="10" fill="#f5f7fa" stroke="#34495e" stroke-width="1.5"/>
  <text x="176" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#2c3e50">FACIAL NERVE (CN VII) PALSY</text>

  <!-- face icon: right side affected -->
  <circle cx="176" cy="170" r="60" fill="#fdf0e6" stroke="#b5651d" stroke-width="2"/>
  <line x1="176" y1="110" x2="176" y2="230" stroke="#bbb" stroke-width="1" stroke-dasharray="4 4"/>
  <!-- healthy (left of image) forehead crease -->
  <path d="M150 140 q-14 4 -22 0" fill="none" stroke="#8a5a2b" stroke-width="2"/>
  <!-- affected (right) smooth forehead: no crease, flag -->
  <text x="206" y="138" font-size="10" fill="#c0392b" font-weight="700">smooth</text>
  <!-- eyes: left closed (curve), right open (circle, can't close) -->
  <path d="M146 160 q8 6 16 0" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="198" cy="160" r="7" fill="#fff" stroke="#c0392b" stroke-width="2"/>
  <circle cx="198" cy="160" r="2.5" fill="#333"/>
  <!-- mouth pulled to healthy (left) side -->
  <path d="M150 196 q26 14 40 -6" fill="none" stroke="#c0392b" stroke-width="3"/>

  <g font-size="12">
    <text x="176" y="258" text-anchor="middle" fill="#444">&#8226; smooth forehead, can't close eye</text>
    <text x="176" y="278" text-anchor="middle" fill="#444">&#8226; WHOLE half-face (forehead too)</text>
    <text x="176" y="298" text-anchor="middle" fill="#444">&#8226; mouth pulls to the HEALTHY side</text>
    <text x="176" y="322" text-anchor="middle" font-weight="700" fill="#2980b9">&#8594; peripheral CN VII compression</text>
  </g>

  <!-- RIGHT: Erb-Duchenne -->
  <rect x="352" y="64" width="304" height="286" rx="10" fill="#f5f7fa" stroke="#34495e" stroke-width="1.5"/>
  <text x="504" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#2c3e50">ERB-DUCHENNE (C5&#8211;C6)</text>

  <!-- arm: waiter's tip, adducted + internally rotated + extended + pronated -->
  <circle cx="504" cy="128" r="16" fill="#fdf0e6" stroke="#b5651d" stroke-width="2"/>
  <rect x="496" y="142" width="16" height="60" rx="6" fill="#fdf0e6" stroke="#b5651d" stroke-width="2"/>
  <!-- arm hanging adducted along trunk -->
  <rect x="512" y="160" width="14" height="70" rx="6" fill="#fdf0e6" stroke="#b5651d" stroke-width="2"/>
  <!-- forearm pronated, palm back -->
  <rect x="514" y="226" width="12" height="44" rx="5" fill="#fdf0e6" stroke="#b5651d" stroke-width="2"/>
  <text x="556" y="200" font-size="10" fill="#c0392b" font-weight="700">adducted</text>
  <text x="556" y="248" font-size="10" fill="#c0392b" font-weight="700">pronated</text>

  <g font-size="12">
    <text x="504" y="288" text-anchor="middle" fill="#444">&#8226; arm adducted + internally rotated</text>
    <text x="504" y="308" text-anchor="middle" fill="#444">&#8226; elbow extended, forearm pronated</text>
    <text x="504" y="328" text-anchor="middle" font-weight="700" fill="#8e44ad">&#8594; "waiter's tip" &#183; FACE is normal</text>
  </g>

  <!-- tell banner -->
  <rect x="20" y="372" width="640" height="78" rx="8" fill="#111"/>
  <text x="340" y="396" text-anchor="middle" font-size="13.5" font-weight="700" fill="#fff">THE TELL</text>
  <text x="340" y="418" text-anchor="middle" font-size="12.5" fill="#eee">forehead + eye on one side = CN VII (whole half-face). arm posture, face spared = Erb (C5&#8211;C6).</text>
  <text x="340" y="438" text-anchor="middle" font-size="12.5" fill="#bbb">don't swap them: the face palsy involves the forehead; Erb is a limb, not a face</text>
</svg>
